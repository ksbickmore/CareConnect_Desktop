# Builds Windows distributables with Electron Forge and attaches them to a
# draft GitHub release whenever a version tag (v*) is pushed.
#
# Test locally with nektos act (runs on your Windows host, skips the release):
#   act push -W .github/workflows/release.yml -e .github/act-events/tag-push.json -P windows-latest=-self-hosted

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - run: npm ci --no-audit --no-fund --loglevel=error

      # Squirrel's update channel keys off the .nupkg version, so a mismatched
      # tag would publish an installer that claims the wrong version.
      - name: Verify tag matches package.json version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'.TrimStart('v')
          $pkg = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $pkg) {
            Write-Error "Tag v$tag does not match package.json version $pkg"
            exit 1
          }
          Write-Host "Tag v$tag matches package.json version $pkg"

      # premake runs clean + fetch-models, so this needs network access.
      - name: Build distributables
        run: npm run make

      - name: Create draft release
        if: ${{ !env.ACT }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            out/make/squirrel.windows/**/*.exe
            out/make/squirrel.windows/**/*.nupkg
            out/make/squirrel.windows/**/RELEASES
            out/make/zip/**/*.zip

      # act sets ACT=true; end local runs with proof of what would be uploaded.
      - name: List artifacts (local act run)
        if: ${{ env.ACT }}
        shell: pwsh
        run: Get-ChildItem -Recurse out/make -File | Select-Object FullName, Length | Format-Table -AutoSize
